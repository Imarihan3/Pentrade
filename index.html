<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Trade - Archive Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020204; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        
        /* Glassmorphism UI Matrix */
        .glass-panel {
            position: absolute; z-index: 10;
            background: rgba(10, 10, 15, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(214, 175, 55, 0.15);
            border-radius: 8px; padding: 30px;
            color: #e5e5e5; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        
        #auth-box { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; text-align: center; }
        #hud-overlay { top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; }
        .hud-text { color: #d4af37; font-size: 0.8rem; letter-spacing: 2px; opacity: 0.6; }
        
        #request-card {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; display: none; text-align: center;
            border-color: rgba(214, 175, 55, 0.4);
            box-shadow: 0 0 40px rgba(214,175,55,0.15);
        }

        #action-box { bottom: 10%; left: 50%; transform: translateX(-50%); display: none; }

        input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(214,175,55,0.2);
            padding: 12px; margin: 10px 0; color: #fff; border-radius: 4px; font-family: inherit; outline: none;
        }
        input:focus { border-color: #d4af37; }

        .gold-btn {
            background: linear-gradient(135deg, #1c1c24 0%, #0c0c0f 100%);
            color: #d4af37; border: 1px solid rgba(214,175,55,0.4);
            padding: 14px 28px; width: 100%; cursor: pointer; font-family: inherit;
            letter-spacing: 2px; font-weight: bold; border-radius: 4px; transition: all 0.4s ease;
        }
        .gold-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 20px rgba(214,175,55,0.3); }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn-decline { color: #a13b3b; border-color: rgba(161,59,59,0.4); }
        .btn-decline:hover { box-shadow: 0 0 20px rgba(161,59,59,0.3); border-color: #a13b3b; }
        
        .pen-preview { width: 100%; height: 180px; background: rgba(255,255,255,0.02); margin: 15px 0; border-radius: 4px; object-fit: contain; border: 1px dashed rgba(214,175,55,0.15); }
    </style>
</head>
<body>

    <div id="hud-overlay">
        <div class="hud-text">SECURE ACCESS ROUTER</div>
        <div class="hud-text" id="user-display">UNAUTHORIZED</div>
    </div>

    <div class="glass-panel" id="auth-box">
        <h3 style="color:#d4af37; letter-spacing:4px; margin-bottom:15px;">IDENTITY GATE</h3>
        <input type="email" id="auth-email" placeholder="ENTER EMAIL ADDRESS">
        <input type="password" id="auth-pass" placeholder="ENTER ACCESS PHRASE">
        <button class="gold-btn" id="auth-action" style="margin-top:10px;">INITIALIZE SESSION</button>
    </div>

    <div class="glass-panel" id="request-card">
        <h4 style="color:#d4af37; letter-spacing:3px;">INCOMING BROKER OFFER</h4>
        <p class="hud-text" id="req-sender" style="margin: 8px 0;"></p>
        <img class="pen-preview" id="req-img" src="" alt="Pending Item Asset">
        <h2 id="req-name" style="font-weight:300; letter-spacing:2px; margin-bottom:5px;"></h2>
        <div class="btn-group">
            <button class="gold-btn btn-decline" id="act-decline">REJECT</button>
            <button class="gold-btn" id="act-accept">ACCEPT</button>
        </div>
    </div>

    <div class="glass-panel" id="action-box">
        <button class="gold-btn" id="go-trade" style="padding: 16px 45px;">CONSTRUCT NEW TRANSACTION</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURATION: Replace with your actual Firebase project credentials
        const firebaseConfig = {
            apiKey: "AIzaSyYourKeyHere...",
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-app",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:1234:web:abcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let activeTradeId = null;

        // --- Three.js Environment Render Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020204);
        scene.fog = new THREE.FogExp2(0x020204, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Scene Infrastructure Assembly
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0f, roughness: 0.2 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05); scene.add(ambientLight);
        const spotLight = new THREE.PointLight(0xd4af37, 1.5, 30); spotLight.position.set(0, 8, 5); scene.add(spotLight);

        // Single Dynamic Focused 3D Floating Token Object
        const tokenGeo = new THREE.BoxGeometry(2.5, 3.8, 0.08);
        const tokenMat = new THREE.MeshStandardMaterial({ color: 0x12121a, metalness: 0.8, roughness: 0.2, emissive: 0xd4af37, emissiveIntensity: 0.05 });
        const focalToken = new THREE.Mesh(tokenGeo, tokenMat);
        focalToken.position.set(0, 3, -10);
        scene.add(focalToken);

        function animate() {
            requestAnimationFrame(animate);
            const time = typeof clock !== 'undefined' ? clock.getElapsedTime() : performance.now() * 0.001;
            
            // Quiet environment animation loop parameters
            focalToken.rotation.y = Math.sin(time * 0.5) * 0.2;
            focalToken.position.y = 3 + Math.sin(time * 1.2) * 0.1;
            
            camera.position.x = Math.sin(time * 0.2) * 0.5;
            renderer.render(scene, camera);
        }
        animate();

        // --- Client Authentication Terminal Controller ---
        document.getElementById('auth-action').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch(err) { alert(err.message); }
            }
        });

        // --- Real-time Account State Router ---
        onAuthStateChanged(auth, (user) => {
            if(user) {
                activeUser = user;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('user-display').innerText = user.email.toUpperCase();
                document.getElementById('action-box').style.display = 'block';
                initializeIncomingListener(user.email);
            }
        });

        // --- Firebase Streaming Offer Pipeline Listener ---
        function initializeIncomingListener(userEmail) {
            const q = query(collection(db, "trades"), where("receiverEmail", "==", userEmail), where("status", "==", "pending"));
            onSnapshot(q, (snapshot) => {
                if(!snapshot.empty) {
                    const docSnap = snapshot.docs[0];
                    activeTradeId = docSnap.id;
                    const data = docSnap.data();

                    // Shift ambient 3D card layout toward lens vector coordinates
                    focalToken.position.set(0, 3, 10);
                    tokenMat.emissiveIntensity = 0.6; // High energy glow

                    // Mount parameters onto DOM UI element
                    document.getElementById('req-sender').innerText = `FROM: ${data.senderEmail}`;
                    document.getElementById('req-name').innerText = data.senderPenName || "Artifact Specimen";
                    document.getElementById('req-img').src = data.senderPenImg || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111'/></svg>";
                    
                    document.getElementById('action-box').style.display = 'none';
                    document.getElementById('request-card').style.display = 'block';
                } else {
                    document.getElementById('request-card').style.display = 'none';
                    document.getElementById('action-box').style.display = 'block';
                    focalToken.position.set(0, 3, -10);
                    tokenMat.emissiveIntensity = 0.05;
                }
            });
        }

        // --- System Resolution Event Channels ---
        document.getElementById('act-accept').addEventListener('click', async () => {
            if(!activeTradeId) return;
            window.location.href = `trade.html?id=${activeTradeId}`;
        });

        document.getElementById('act-decline').addEventListener('click', async () => {
            if(!activeTradeId) return;
            await deleteDoc(doc(db, "trades", activeTradeId));
            alert("Contract Purged.");
        });

        document.getElementById('go-trade').addEventListener('click', () => {
            window.location.href = "trade.html";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
