<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Trade - Chamber Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010103; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        
        #chamber-hud {
            position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 35px; pointer-events: none;
        }
        .interactive { pointer-events: auto; }
        
        /* Projected Interface Design Matrix */
        .glass-panel {
            background: rgba(4, 4, 6, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(214, 175, 55, 0.25); border-radius: 2px; padding: 30px; color: #fff;
            width: 440px; box-shadow: 0 40px 80px rgba(0,0,0,0.95);
            opacity: 0; transform: translateY(15px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel.revealed { opacity: 1; transform: translateY(0); }
        
        .workspace-row { display: flex; justify-content: space-between; width: 100%; margin-top: auto; margin-bottom: auto; }
        
        input, textarea, select {
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(214,175,55,0.2);
            padding: 12px; margin: 10px 0; color: #fff; border-radius: 2px; font-family: inherit; outline: none; font-size: 0.8rem;
            letter-spacing: 1px; transition: border-color 0.4s ease;
        }
        input:focus, textarea:focus, select:focus { border-color: #d4af37; }
        
        /* Ancient Wax Seal Confirmation Interface Module */
        .gold-btn {
            background: linear-gradient(135deg, #231d16 0%, #0d0a08 100%); color: #d4af37;
            border: 1px solid rgba(214,175,55,0.4); padding: 20px; width: 100%; cursor: pointer;
            font-family: inherit; letter-spacing: 4px; font-weight: bold; border-radius: 2px; 
            transition: all 0.5s ease; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .gold-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 35px rgba(214,175,55,0.4); }
        
        #master-confirm-btn {
            background: linear-gradient(135deg, #501313 0%, #1e0505 100%);
            border-color: rgba(214,175,55,0.5); color: #eec570; font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); box-shadow: 0 0 20px rgba(80,19,19,0.5);
        }
        #master-confirm-btn:hover {
            background: linear-gradient(135deg, #6c1b1b 0%, #2b0808 100%);
            box-shadow: 0 0 35px rgba(214,175,55,0.6); border-color: #fff;
        }
        
        .display-box { 
            width: 100%; min-height: 150px; background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(214,175,55,0.15); margin-top: 15px; padding: 20px; 
            border-radius: 2px; line-height: 1.6; font-size: 0.85rem;
        }
        .preview-frame { 
            width: 100%; height: 140px; object-fit: contain; background: rgba(0,0,0,0.4); 
            border-radius: 2px; border: 1px dashed rgba(214,175,55,0.25); margin-bottom: 5px;
        }
        
        #footer-control { width: 100%; max-width: 550px; margin: 0 auto; text-align: center; }
        
        #completion-blockout {
            position: absolute; top:0; left:0; width:100%; height:100%; background: #010103; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #completion-blockout.triggered { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="completion-blockout">
        <h1 style="color:#d4af37; letter-spacing: 20px; font-weight: 300; font-size: 2.2rem; margin-bottom:15px;">THE AGREEMENT WITNESSED</h1>
        <p style="color:#666; letter-spacing: 5px; font-size:0.8rem;">THE ARCHIVE REMEMBERS.</p>
    </div>

    <div id="chamber-hud">
        <div style="display:flex; justify-content:space-between; width:100%;">
            <div class="glass-panel interactive" id="dispatch-panel" style="width:360px; padding:20px;">
                <input type="email" id="target-recipient" placeholder="COUNTERPARTY DESTINATION EMAIL">
                <button class="gold-btn" id="init-contract-btn" style="padding:12px; font-size:0.75rem;">DISPATCH TRANSACTION GRID</button>
            </div>
            <div style="color:#d4af37; letter-spacing:5px; text-align:right; font-size:0.8rem; padding:15px; text-shadow: 0 0 8px rgba(214,175,55,0.3);">
                CHAMBER LOCK V.09
            </div>
        </div>

        <div class="workspace-row">
            <div class="glass-panel interactive" id="local-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">LOCAL CLIENT OFFER</h4>
                <input type="file" id="local-file" accept="image/*" style="display:none;">
                <button class="gold-btn" onclick="document.getElementById('local-file').click()" style="padding:12px; font-size:0.7rem; margin-bottom:10px;">UPLOAD SPECIMEN MAP</button>
                <img class="preview-frame" id="local-preview-img" src="" style="display:none;">
                
                <input type="text" id="local-name" placeholder="PEN VARIANT NAME">
                <input type="text" id="local-brand" placeholder="MANUFACTURER BRAND">
                <select id="local-cond">
                    <option value="Mint (Collectible)">MINT CONDITION</option>
                    <option value="Fine (Light Wear)">FINE CONDITION</option>
                    <option value="Vintage Restored">VINTAGE RESTORED</option>
                </select>
                <textarea id="local-desc" rows="2" placeholder="STRUCTURAL VAULT LOGIC NOTES..."></textarea>
            </div>

            <div class="glass-panel" id="remote-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">COUNTERPARTY STREAM</h4>
                <img class="preview-frame" id="remote-preview-img" src="" style="display:none;">
                <div class="display-box" id="remote-data-content">AWAITING SYSTEM LINK ATOMIC CONFIGURATION...</div>
            </div>
        </div>

        <div id="footer-control" class="interactive">
            <button class="gold-btn" id="master-confirm-btn">PRESS WAX SEAL RECOGNITION</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBW2cqHZSZ7pe8BhwW82p8H3uVlhndsZY",
            authDomain: "pentrade.firebaseapp.com",
            projectId: "pentrade",
            storageBucket: "pentrade.firebasestorage.app",
            messagingSenderId: "912322438619",
            appId: "1:912322438619:web:0c68111d715cfdb5b7b3fe",
            measurementId: "G-LHV26VY0WR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let sessionTradeId = null;
        let currentRole = null;
        let transmissionLock = false;
        let cachedPeerDataString = "";

        // Audio System Effects Channel
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSealMeltTone() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 1.0);
            osc2.type = 'sine'; osc2.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc2.start(); osc.stop(audioCtx.currentTime + 1.2); osc2.stop(audioCtx.currentTime + 1.2);
        }

        // Reveal projected UI panels with sequencing
        function cascadeUIPanels() {
            setTimeout(() => document.getElementById('dispatch-panel').classList.add('revealed'), 200);
            setTimeout(() => document.getElementById('local-panel').classList.add('revealed'), 500);
            setTimeout(() => document.getElementById('remote-panel').classList.add('revealed'), 800);
        }

        // --- 3D Architecture Canvas Execution System ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.05);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4.5, 11);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        // Core Vault Table Architecture
        const deskMat = new THREE.MeshStandardMaterial({ color: 0x0f0c08, roughness: 0.35, metalness: 0.4 });
        const desk = new THREE.Mesh(new THREE.BoxGeometry(8, 1.4, 4.5), deskMat);
        desk.position.set(0, 0.7, -1); scene.add(desk);

        // Mystical Cloaked Silhouette Representation Object
        const clothMat = new THREE.MeshStandardMaterial({ color: 0x040406, roughness: 0.95 });
        const traderSilhouette = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1.0, 3.2, 12), clothMat);
        traderSilhouette.position.set(0, 2.9, -5.5); scene.add(traderSilhouette);

        // Golden holographic projection showcase frames
        const leftShowcaseGeo = new THREE.BoxGeometry(1.8, 1.8, 0.1);
        const leftShowcaseMat = new THREE.MeshStandardMaterial({ color: 0x111116, emissive: 0xd4af37, emissiveIntensity: 0.1, roughness: 0.2 });
        const leftShowcase = new THREE.Mesh(leftShowcaseGeo, leftShowcaseMat);
        leftShowcase.position.set(-2.2, 2.2, -1); scene.add(leftShowcase);

        const rightShowcase = leftShowcase.clone();
        rightShowcase.position.set(2.2, 2.2, -1); scene.add(rightShowcase);

        const warmLight = new THREE.PointLight(0xd4af37, 1.6, 18); warmLight.position.set(0, 5, -0.5); scene.add(warmLight);
        const auxiliaryBlue = new THREE.PointLight(0x2244aa, 0.8, 15); auxiliaryBlue.position.set(4, 3, -3); scene.add(auxiliaryBlue);

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const time = performance.now() * 0.001;
            
            // Soft atmospheric drift
            traderSilhouette.position.y = 2.9 + Math.sin(time * 0.9) * 0.015;
            leftShowcase.rotation.y = time * 0.25;
            rightShowcase.rotation.y = -time * 0.25;
            
            // Subtle cinematic camera drift dynamics
            camera.position.x = Math.sin(time * 0.2) * 0.2;
            camera.position.y = 4.5 + Math.cos(time * 0.3) * 0.05;
            
            renderer.render(scene, camera);
        }
        renderLoop();

        // --- Stream Engine Binding Routines ---
        onAuthStateChanged(auth, (user) => {
            if(user) {
                activeUser = user;
                evalUrlParameters();
                cascadeUIPanels();
            } else {
                window.location.href = "index.html";
            }
        });

        function evalUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const routeId = urlParams.get('id');

            if(routeId){
                sessionTradeId = routeId;
                document.getElementById('target-recipient').style.display = 'none';
                document.getElementById('init-contract-btn').style.display = 'none';
                document.getElementById('dispatch-panel').style.borderColor = 'transparent';
                currentRole = null;
                mountSyncPipeline();
            }
        }

        document.getElementById('init-contract-btn').addEventListener('click', async () => {
            const target = document.getElementById('target-recipient').value.trim();
            if(!target || target === activeUser.email) return alert("System Route Generation Denied: Invalid Coordinate Entry.");

            const customId = `TRADE_${Date.now()}`;
            sessionTradeId = customId;

            try {
                await setDoc(doc(db, "trades", customId), {
                    id: customId,
                    senderEmail: activeUser.email,
                    receiverEmail: target,
                    status: "pending",
                    senderConfirm: false,
                    receiverConfirm: false,
                    senderPenName: "", senderPenBrand: "", senderPenCond: "", senderPenDesc: "", senderPenImg: "",
                    receiverPenName: "", receiverPenBrand: "", receiverPenCond: "", receiverPenDesc: "", receiverPenImg: ""
                });
                document.getElementById('init-contract-btn').innerText = "CHAMBER ALIGNED // MATRIX ACTIVE";
                currentRole = "sender";
                mountSyncPipeline();
            } catch(e) { alert("Matrix Generation Failure: " + e.message); }
        });

        ['local-name', 'local-brand', 'local-cond', 'local-desc'].forEach(id => {
            document.getElementById(id).addEventListener('input', synchronizeLocalChangesToCloud);
        });

        document.getElementById('local-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = async (event) => {
                const b64 = event.target.result;
                document.getElementById('local-preview-img').src = b64;
                document.getElementById('local-preview-img').style.display = 'block';
                
                if(sessionTradeId) {
                    const payload = {};
                    payload[`${currentRole}PenImg`] = b64;
                    try { 
                        await updateDoc(doc(db, "trades", sessionTradeId), payload); 
                        await synchronizeLocalChangesToCloud();
                    } catch(err){}
                }
            };
            r.readAsDataURL(file);
        });

        async function synchronizeLocalChangesToCloud() {
            if(!sessionTradeId || transmissionLock) return;
            
            const p = {};
            p[`${currentRole}PenName`] = document.getElementById('local-name').value;
            p[`${currentRole}PenBrand`] = document.getElementById('local-brand').value;
            p[`${currentRole}PenCond`] = document.getElementById('local-cond').value;
            p[`${currentRole}PenDesc`] = document.getElementById('local-desc').value;

            try { await updateDoc(doc(db, "trades", sessionTradeId), p); } catch(e){}
        }

        // --- Real-time Bidirectional Synced UI Data Rendering Pipeline ---
        function mountSyncPipeline() {
            onSnapshot(doc(db, "trades", sessionTradeId), async (snapshot) => {
                if(!snapshot.exists()) return;
                transmissionLock = true;
                const d = snapshot.data();

                if(activeUser.email === d.senderEmail){
                    currentRole = "sender";
                }else{
                    currentRole = "receiver";
                }

                const peer = (currentRole === 'sender') ? 'receiver' : 'sender';

                // Check for physical payload variation to change holographic frame glow matrix updates
                const activeDataString = `${d[peer+'PenName']}-${d[peer+'PenBrand']}-${d[peer+'PenCond']}-${d[peer+'PenDesc']}`;
                if (activeDataString !== cachedPeerDataString) {
                    cachedPeerDataString = activeDataString;
                    rightShowcase.material.emissiveIntensity = 0.8; // Pulse up on incoming data step
                    setTimeout(() => rightShowcase.material.emissiveIntensity = 0.2, 600);
                }

                // Inject counterparty properties
                document.getElementById('remote-data-content').innerHTML = `
                    <p style="color:#d4af37; font-size:0.75rem; margin-bottom:8px; letter-spacing:1px;">ORIGIN NODE: ${d[peer+'Email'].toUpperCase()}</p>
                    <h2 style="font-weight:300; margin-bottom:10px; letter-spacing:2px; color:#fff;">${d[peer+'PenName'] || 'Awaiting Artifact Label...'}</h2>
                    <p style="margin-bottom:4px;"><b>BRAND:</b> ${d[peer+'PenBrand'] || 'N/A'}</p>
                    <p style="margin-bottom:4px;"><b>VAULT COND:</b> ${d[peer+'PenCond'] || 'N/A'}</p>
                    <p style="margin-top:12px; font-size:0.8rem; color:#8a8a93; font-style:italic;">"${d[peer+'PenDesc'] || ''}"</p>
                `;
                
                const rImg = document.getElementById('remote-preview-img');
                if(d[`${peer}PenImg`]){
                    rImg.src = d[`${peer}PenImg`]; rImg.style.display = "block";
                }else{
                    rImg.style.display = "none";
                }

                // Sync data down to local parameters safely if not currently focused
                if(document.activeElement?.id ? !document.activeElement.id.startsWith('local') : true) {
                    document.getElementById('local-name').value = d[`${currentRole}PenName`] || "";
                    document.getElementById('local-brand').value = d[`${currentRole}PenBrand`] || "";
                    document.getElementById('local-cond').value = d[`${currentRole}PenCond`] || "Mint (Collectible)";
                    document.getElementById('local-desc').value = d[`${currentRole}PenDesc`] || "";
                    
                    const myImg = document.getElementById("local-preview-img");
                    if(d[`${currentRole}PenImg`]){
                        myImg.src = d[`${currentRole}PenImg`]; myImg.style.display = "block";
                        leftShowcase.material.emissiveIntensity = 0.4;
                    }
                }

                // Reflect wax seal verification steps visual updates
                if(d[`${currentRole}Confirm`]) {
                    document.getElementById('master-confirm-btn').innerText = "SEAL MELTED // AWAITING SECURE MATCH MATRICES...";
                    document.getElementById('master-confirm-btn').style.background = 'linear-gradient(135deg, #111 0%, #000 100%)';
                    document.getElementById('master-confirm-btn').style.borderColor = '#443410';
                    document.getElementById('master-confirm-btn').style.color = '#666';
                }

                // If both parameters evaluate valid, finalize lifecycle state mutation
                if(d.senderConfirm && d.receiverConfirm){
                    if(d.status !== "completed"){
                        try{
                            await updateDoc(doc(db,"trades",sessionTradeId),{ status:"completed" });
                        }catch(e){}
                    }

                    // Turn off 3D lighting arrays dynamically to vanish assets into space
                    warmLight.intensity = 0; auxiliaryBlue.intensity = 0;
                    document.getElementById("completion-blockout").classList.add("triggered");

                    setTimeout(()=>{
                        window.location.href="index.html";
                    },4500);
                }

                transmissionLock = false;
            });
        }

        // Action: Seal interface commit trigger
        document.getElementById('master-confirm-btn').addEventListener('click', async () => {
            if(!sessionTradeId) return;
            playSealMeltTone();
            const p = {}; p[`${currentRole}Confirm`] = true;
            try { 
                await synchronizeLocalChangesToCloud();
                await updateDoc(doc(db, "trades", sessionTradeId), p); 
            } catch(e){}
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
