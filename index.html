<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive - Entry Ritual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010103; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        
        /* Cinematic Ritual Text Display Overlays */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1,1,3,0.85); z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px;
            pointer-events: auto; transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ritual-text {
            color: #d4af37; font-size: 1.3rem; letter-spacing: 5px; text-align: center;
            max-width: 650px; min-height: 100px; line-height: 2; text-shadow: 0 0 15px rgba(214,175,55,0.4);
        }
        
        /* Holographic Underworld UI Interfaces */
        .glass-panel {
            position: absolute; z-index: 10;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(214, 175, 55, 0.25);
            border-radius: 2px; padding: 35px;
            color: #e5e5e5; box-shadow: 0 25px 60px rgba(0,0,0,0.95);
            opacity: 0; transform: translate(-50%, -45%) scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .glass-panel.visible { opacity: 1; pointer-events: auto; }
        
        #auth-box { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 420px; text-align: center; }
        #auth-box.visible { transform: translate(-50%, -50%) scale(1); }
        
        #hud-overlay { top: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 2s ease; }
        #hud-overlay.visible { opacity: 1; }
        .hud-text { color: #d4af37; font-size: 0.75rem; letter-spacing: 4px; opacity: 0.6; text-shadow: 0 0 5px rgba(214,175,55,0.4); }
        
        #request-card {
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95);
            width: 440px; text-align: center; border-color: rgba(214, 175, 55, 0.45);
        }
        #request-card.visible { transform: translate(-50%, -50%) scale(1); }

        #action-box { bottom: 10%; left: 50%; transform: translateX(-50%) scale(0.95); }
        #action-box.visible { transform: translateX(-50%) scale(1); }

        input {
            width: 100%; background: rgba(0,0,0,0.7); border: 1px solid rgba(214,175,55,0.2);
            padding: 15px; margin: 12px 0; color: #fff; border-radius: 2px; font-family: inherit; outline: none;
            letter-spacing: 1px; transition: all 0.3s ease;
        }
        input:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(214,175,55,0.15); }

        .gold-btn {
            background: linear-gradient(135deg, #141418 0%, #050507 100%);
            color: #d4af37; border: 1px solid rgba(214,175,55,0.4);
            padding: 16px; width: 100%; cursor: pointer; font-family: inherit;
            letter-spacing: 3px; font-weight: bold; border-radius: 2px; transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        .gold-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 25px rgba(214,175,55,0.3); transform: translateY(-1px); }
        
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-decline { color: #c34a4a; border-color: rgba(195,74,74,0.35); }
        .btn-decline:hover { box-shadow: 0 0 25px rgba(195,74,74,0.25); border-color: #c34a4a; }
        
        .pen-preview { 
            width: 100%; height: 180px; background: rgba(0,0,0,0.6); margin: 20px 0; 
            border-radius: 2px; object-fit: contain; border: 1px dashed rgba(214,175,55,0.2); pading: 10px;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="ritual-text">✨ CLICK TO ENTER THE ALLEYWAY MATRIX ✨</div>
    </div>

    <div id="hud-overlay">
        <div class="hud-text">PEN ARCHIVE // UNDERWORLD SIGNAL ACTIVATED</div>
        <div class="hud-text" id="user-display">OFFLINE</div>
    </div>

    <div class="glass-panel" id="auth-box">
        <h3 style="color:#d4af37; letter-spacing:6px; margin-bottom:20px; font-weight: 300;">IDENTITY MANIFEST</h3>
        <input type="email" id="auth-email" placeholder="CRYPTOGRAPHIC EMAIL">
        <input type="password" id="auth-pass" placeholder="VAULT ACCREDITATION PASSPHRASE">
        <input type="text" id="room-code" placeholder="CHAMBER SYNC CODE (OPTIONAL)">
        <button class="gold-btn" id="auth-action" style="margin-top:15px;">INITIALIZE SESSION</button>
        <button class="gold-btn" id="auth-create" style="margin-top:10px; border-color: rgba(214,175,55,0.2); font-size: 0.75rem;">ENGRAVE NEW ACCOUNT</button>
    </div>

    <div class="glass-panel" id="request-card">
        <h4 style="color:#d4af37; letter-spacing:4px; font-weight: 300;">INCOMING ARTIFACT EXCHANGE</h4>
        <p class="hud-text" id="req-sender" style="margin: 12px 0; font-size: 0.7rem;"></p>
        <img class="pen-preview" id="req-img" src="" alt="Exchange Asset Preview">
        <h2 id="req-name" style="font-weight:300; letter-spacing:3px; margin-bottom:5px; color: #fff;"></h2>
        <div class="btn-group">
            <button class="gold-btn btn-decline" id="act-decline">PURGE CONTRACT</button>
            <button class="gold-btn" id="act-accept">EXECUTE SWAP</button>
        </div>
    </div>

    <div class="glass-panel" id="action-box">
        <button class="gold-btn" id="go-trade" style="padding: 20px 60px;">MANIFEST FRESH CHAMBER NODE</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBW2cqHZSZ7pe8BhwW82p8H3uVlhndsZY",
            authDomain: "pentrade.firebaseapp.com",
            projectId: "pentrade",
            storageBucket: "pentrade.firebasestorage.app",
            messagingSenderId: "912322438619",
            appId: "1:912322438619:web:0c68111d715cfdb5b7b3fe",
            measurementId: "G-LHV26VY0WR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let activeTradeId = null;

        // --- Synthetic Audio Environment Generator ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function createRainSound() {
            const bufferSize = audioCtx.sampleRate * 2, noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2.0 - 1.0; }
            const whiteNoise = audioCtx.createBufferSource(); whiteNoise.buffer = noiseBuffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
            const gain = audioCtx.createGain(); gain.gain.value = 0.012;
            whiteNoise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            whiteNoise.loop = true; whiteNoise.start();
        }

        // --- Cinematic Narrative Initialization Script ---
        const storyLines = [
            "People think value is measured in gold...",
            "They are wrong.",
            "Ink remembers every hand that has ever held it.",
            "Some pens have written history. Some have signed peace.",
            "Tonight... You decide their fate."
        ];
        let currentLineIdx = 0, charIdx = 0;
        const txtEl = document.getElementById('ritual-text');

        function executeTypingSequence() {
            if (currentLineIdx < storyLines.length) {
                if (charIdx < storyLines[currentLineIdx].length) {
                    txtEl.innerHTML += storyLines[currentLineIdx].charAt(charIdx);
                    charIdx++;
                    setTimeout(executeTypingSequence, 50);
                } else {
                    setTimeout(() => {
                        txtEl.style.opacity = 0;
                        setTimeout(() => {
                            txtEl.innerHTML = ""; charIdx = 0; currentLineIdx++;
                            txtEl.style.opacity = 1;
                            executeTypingSequence();
                        }, 1200);
                    }, 2000);
                }
            } else {
                document.getElementById('intro-overlay').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    document.getElementById('hud-overlay').classList.add('visible');
                    if(activeUser) initializeIncomingListener(activeUser.email);
                    else document.getElementById('auth-box').classList.add('visible');
                }, 2000);
            }
        }

        window.addEventListener('click', () => {
            if(audioCtx.state === 'suspended') { audioCtx.resume(); createRainSound(); txtEl.innerHTML = ""; executeTypingSequence(); }
        }, { once: true });

        // --- 3D Dark Alley and Trader Workspace ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.07);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        // Alley Architecture & Wet Ground Floor Plane
        const floorGeo = new THREE.PlaneGeometry(80, 80);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.1, metalness: 0.6 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

        const wallLeftGeo = new THREE.BoxGeometry(1, 15, 40);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x020204, roughness: 0.9 });
        const wallLeft = new THREE.Mesh(wallLeftGeo, wallMat); wallLeft.position.set(-5, 4, -5); scene.add(wallLeft);
        const wallRight = wallLeft.clone(); wallRight.position.x = 5; scene.add(wallRight);

        // Ancient Workspace Table Struct
        const desk = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 2), new THREE.MeshStandardMaterial({ color: 0x0a0705, roughness: 0.5 }));
        desk.position.set(0, 0.6, -2); scene.add(desk);

        // The Hooded Mystery Trader Model Block
        const traderGroup = new THREE.Group();
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.8, 2.5, 10);
        const hoodMat = new THREE.MeshStandardMaterial({ color: 0x020203, roughness: 0.95 });
        const traderBody = new THREE.Mesh(bodyGeo, hoodMat); traderBody.position.y = 1.25; traderGroup.add(traderBody);
        
        const headGeo = new THREE.SphereGeometry(0.35, 8, 8);
        const traderHead = new THREE.Mesh(headGeo, hoodMat); traderHead.position.y = 2.4; traderGroup.add(traderHead);
        traderGroup.position.set(0, 0.6, -2.8); scene.add(traderGroup);

        // Ambient Moon Lighting & Flickering Streetlamp Core
        const moonLight = new THREE.DirectionalLight(0x1b263b, 0.4); moonLight.position.set(5, 20, 5); scene.add(moonLight);
        
        const streetLamp = new THREE.PointLight(0xd4af37, 1.5, 20); streetLamp.position.set(0, 6, 2); scene.add(streetLamp);
        const deskInkGlow = new THREE.PointLight(0xd4af37, 0.8, 4); deskInkGlow.position.set(0, 1.5, -1.8); scene.add(deskInkGlow);

        // Subterranean Floating Mist/Rain Particles
        const particleCount = 250;
        const pGeometry = new THREE.BufferGeometry(), pPositions = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount*3; i+=3) {
            pPositions[i] = (Math.random() - 0.5) * 15;
            pPositions[i+1] = Math.random() * 10;
            pPositions[i+2] = (Math.random() - 0.5) * 20;
        }
        pGeometry.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        const rainParticles = new THREE.Points(pGeometry, new THREE.PointsMaterial({ color: 0x4a5568, size: 0.04, transparent: true, opacity: 0.3 }));
        scene.add(rainParticles);

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            
            // Replicating a broken street lamp lighting pattern
            streetLamp.intensity = (Math.random() > 0.93) ? 0.2 : (1.4 + Math.sin(time * 12) * 0.1);
            
            // Trader slow breathing idle motions
            traderGroup.position.y = 0.6 + Math.sin(time * 1.5) * 0.015;
            
            // Simulating falling precipitation cycle dynamics
            const positions = rainParticles.geometry.attributes.position.array;
            for(let i=1; i<positions.length; i+=3) {
                positions[i] -= 0.15; if(positions[i] < 0) positions[i] = 10;
            }
            rainParticles.geometry.attributes.position.needsUpdate = true;
            
            // Camera subtle breathing matrix translation
            camera.position.x = Math.sin(time * 0.3) * 0.15;
            camera.position.y = 3 + Math.cos(time * 0.4) * 0.05;
            
            renderer.render(scene, camera);
        }
        animate();

        // --- Controller Interventions ---
        document.getElementById('auth-action').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            const roomCode = document.getElementById('room-code').value.trim();
            if(!email || !pass) return;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                if (roomCode) localStorage.setItem("roomCode", roomCode);
            } catch(e) { alert(e.message); }
        });

        document.getElementById('auth-create').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Vault Account Created.");
            } catch(e) { alert(e.message); }
        });

        onAuthStateChanged(auth, (user) => {
            if(user) {
                activeUser = user;
                document.getElementById('auth-box').classList.remove('visible');
                document.getElementById('user-display').innerText = user.email.toUpperCase();
                if (currentLineIdx >= storyLines.length) initializeIncomingListener(user.email);
            }
        });

        function initializeIncomingListener(userEmail) {
            const tradesRef = collection(db, "trades");
            const q = query(tradesRef, where("receiverEmail", "==", userEmail), where("status", "==", "pending"));
            onSnapshot(q, (snapshot) => {
                if(!snapshot.empty) {
                    const docSnap = snapshot.docs[0]; activeTradeId = docSnap.id;
                    const data = docSnap.data();
                    document.getElementById('req-sender').innerText = `ORIGIN CONTRACTOR: ${data.senderEmail.toUpperCase()}`;
                    document.getElementById('req-name').innerText = data.senderPenName || "RARE ARTIFACT SPECIMEN";
                    document.getElementById('req-img').src = data.senderPenImg || "";
                    document.getElementById('action-box').classList.remove('visible');
                    document.getElementById('request-card').classList.add('visible');
                } else {
                    document.getElementById('request-card').classList.remove('visible');
                    document.getElementById('action-box').classList.add('visible');
                }
            });
        }

        document.getElementById('act-accept').addEventListener('click', () => {
            if(activeTradeId) window.location.href = `trade.html?id=${activeTradeId}`;
        });
        document.getElementById('act-decline').addEventListener('click', async () => {
            if(activeTradeId) await deleteDoc(doc(db, "trades", activeTradeId));
        });
        document.getElementById('go-trade').addEventListener('click', () => { window.location.href = "trade.html"; });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
