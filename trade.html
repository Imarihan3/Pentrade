<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chamber - Transaction Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010103; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        
        #chamber-hud {
            position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 35px; pointer-events: none;
        }
        .interactive { pointer-events: auto; }
        
        .glass-panel {
            background: rgba(3, 3, 5, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(214, 175, 55, 0.2); border-radius: 2px; padding: 30px; color: #fff;
            width: 430px; box-shadow: 0 35px 70px rgba(0,0,0,0.95);
            opacity: 0; transform: translateY(15px); transition: all 1s ease;
        }
        .glass-panel.revealed { opacity: 1; transform: translateY(0); }
        
        .workspace-row { display: flex; justify-content: space-between; width: 100%; margin-top: auto; margin-bottom: auto; }
        
        input, textarea, select {
            width: 100%; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(214,175,55,0.15);
            padding: 12px; margin: 10px 0; color: #fff; border-radius: 2px; font-family: inherit; outline: none; font-size: 0.8rem;
        }
        input:focus, textarea:focus, select:focus { border-color: #d4af37; }
        
        .gold-btn {
            background: linear-gradient(135deg, #201b14 0%, #0a0806 100%); color: #d4af37;
            border: 1px solid rgba(214,175,55,0.35); padding: 18px; width: 100%; cursor: pointer;
            font-family: inherit; letter-spacing: 4px; font-weight: bold; border-radius: 2px; transition: all 0.4s ease;
        }
        .gold-btn:hover:not(:disabled) { color: #fff; border-color: #fff; box-shadow: 0 0 30px rgba(214,175,55,0.35); }
        .gold-btn:disabled { color: #444; border-color: rgba(214,175,55,0.1); background: #050507; cursor: not-allowed; }
        
        #master-confirm-btn {
            background: linear-gradient(135deg, #4d1212 0%, #1a0404 100%);
            border-color: rgba(214,175,55,0.4); color: #edc46f; font-size: 1.05rem; letter-spacing: 5px;
        }
        #master-confirm-btn:hover:not(:disabled) { background: linear-gradient(135deg, #601717 0%, #240606 100%); border-color: #fff; }
        
        .display-box { 
            width: 100%; min-height: 140px; background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(214,175,55,0.15); margin-top: 15px; padding: 20px; border-radius: 2px; line-height: 1.6;
            position: relative; overflow: hidden;
        }
        .preview-frame { 
            width: 100%; height: 130px; object-fit: contain; background: rgba(0,0,0,0.5); 
            border-radius: 2px; border: 1px dashed rgba(214,175,55,0.2); margin-bottom: 5px;
        }
        
        #footer-control { width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        #completion-blockout {
            position: absolute; top:0; left:0; width:100%; height:100%; background: #010103; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 2s ease;
        }
        #completion-blockout.triggered { opacity: 1; visibility: visible; }

        /* Archive Notification Panel */
        #archive-toast-container {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; pointer-events: none; display: flex; flex-direction: column; gap: 10px;
        }
        .archive-toast {
            background: rgba(5, 5, 8, 0.95); border: 1px solid #d4af37; color: #fff;
            padding: 15px 30px; font-family: inherit; font-size: 0.8rem; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 2px; pointer-events: auto;
            animation: toastFadeIn 0.4s ease forwards;
        }
        @keyframes toastFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Holographic loading elements */
        .holo-pulse { animation: holoGlow 2s infinite ease-in-out; }
        @keyframes holoGlow { 0%, 100% { border-color: rgba(214,175,55,0.15); } 50% { border-color: rgba(214,175,55,0.6); box-shadow: 0 0 15px rgba(214,175,55,0.2); } }
        
        .holo-text-anim::after {
            content: '...'; display: inline-block; width: 20px; text-align: left;
            animation: holoDot 2s infinite steps(4); vertical-align: bottom;
        }
        @keyframes holoDot { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

        /* Custom Wax Seal Overlay Element */
        #wax-seal-overlay {
            position: absolute; width: 120px; height: 120px; background: radial-gradient(circle, #801818 0%, #4a0505 100%);
            border-radius: 50%; border: 4px double #d4af37; box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; color: #d4af37; font-weight: bold; font-size: 1.8rem;
            letter-spacing: 0; z-index: 105; opacity: 0; transform: scale(3); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; top: calc(50% - 100px); left: calc(50% - 60px);
        }
        #wax-seal-overlay.stamped { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <div id="archive-toast-container"></div>

    <div id="wax-seal-overlay">Ω</div>

    <div id="completion-blockout">
        <h1 style="color:#d4af37; letter-spacing: 15px; font-weight: 300; font-size: 2rem; margin-bottom:15px;">THE SWAP COMMITTED</h1>
        <p style="color:#555; letter-spacing: 4px; font-size:0.8rem;">THE ARCHIVE GROWS SILENT.</p>
    </div>

    <div id="chamber-hud">
        <div style="display:flex; justify-content:space-between; width:100%;">
            <div class="glass-panel interactive" id="dispatch-panel" style="width:360px; padding:20px;">
                <input type="email" id="target-recipient" placeholder="COUNTERPARTY DESTINATION EMAIL">
                <button class="gold-btn" id="init-contract-btn" style="padding:12px; font-size:0.75rem;">DISPATCH TRANSACTION GRID</button>
            </div>
            <div style="color:#d4af37; letter-spacing:4px; font-size:0.8rem; padding:15px;">
                SECURE CHAMBER NODE
            </div>
        </div>

        <div class="workspace-row">
            <div class="glass-panel interactive" id="local-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">LOCAL SPECIMEN LOG</h4>
                <input type="file" id="local-file" accept="image/*" style="display:none;">
                <button class="gold-btn" id="inject-sig-btn" onclick="document.getElementById('local-file').click()" style="padding:12px; font-size:0.7rem; margin-bottom:10px;">INJECT IMAGING SIGNATURE</button>
                <img class="preview-frame" id="local-preview-img" src="" style="display:none;">
                
                <input type="text" id="local-name" placeholder="PEN VARIANT NAME">
                <input type="text" id="local-brand" placeholder="MANUFACTURER BRAND">
                <select id="local-cond">
                    <option value="Mint (Collectible)">MINT CONDITION</option>
                    <option value="Fine (Light Wear)">FINE CONDITION</option>
                    <option value="Vintage Restored">VINTAGE RESTORED</option>
                </select>
                <textarea id="local-desc" rows="2" placeholder="STRUCTURAL SYSTEM RUNTIME NOTES..."></textarea>
            </div>

            <div class="glass-panel" id="remote-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">COUNTERPARTY MANIFEST</h4>
                <img class="preview-frame" id="remote-preview-img" src="" style="display:none;">
                <div class="display-box" id="remote-data-content">AWAITING CORRESPONDING NETWORK NODE STREAM LINK...</div>
            </div>
        </div>

        <div id="footer-control" class="interactive">
            <button class="gold-btn" id="master-confirm-btn" disabled>PRESS WAX SEAL RECOGNITION</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBW2cqHZSZ7pe8BhwW82p8H3uVlhndsZY",
            authDomain: "pentrade.firebaseapp.com",
            projectId: "pentrade",
            storageBucket: "pentrade.firebasestorage.app",
            messagingSenderId: "912322438619",
            appId: "1:912322438619:web:0c68111d715cfdb5b7b3fe",
            measurementId: "G-LHV26VY0WR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let activeUser = null;
        let sessionTradeId = null;
        let currentRole = null;
        let transmissionLock = false;
        let cachedPeerDataString = "";
        let cachedLocalData = { name: "", brand: "", cond: "Mint (Collectible)", desc: "", img: "" };
        let isCompleting = false;

        // Active memory leak protection registry
        const unsubs = [];
        const resourcesToDispose = { geometries: [], materials: [], textures: [] };

        function showArchiveNotification(message) {
            const container = document.getElementById('archive-toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = 'archive-toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = "opacity 0.5s ease";
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        const loadingPhrases = [
            "CONNECTING TO VAULT",
            "VERIFYING CHAMBER",
            "RECEIVING MANIFEST",
            "DECRYPTING TRANSMISSION",
            "SYNCING ARCHIVE"
        ];
        function cycleRemoteLoadingText() {
            if (sessionTradeId || isCompleting) return;
            const contentNode = document.getElementById('remote-data-content');
            if (contentNode && !contentNode.querySelector('p')) {
                const phrase = loadingPhrases[Math.floor(Math.random() * loadingPhrases.length)];
                contentNode.innerHTML = `<span class="holo-text-anim" style="color: #8a8a93; font-size: 0.8rem; letter-spacing: 2px;">${phrase}</span>`;
            }
        }
        const loadingInterval = setInterval(cycleRemoteLoadingText, 2500);

        function validateLocalFields() {
            if (isCompleting) return;
            const nameVal = document.getElementById('local-name').value.trim();
            const brandVal = document.getElementById('local-brand').value.trim();
            const condVal = document.getElementById('local-cond').value;
            const descVal = document.getElementById('local-desc').value.trim();
            const imgElement = document.getElementById('local-preview-img');
            const hasImg = imgElement && imgElement.src && imgElement.style.display === 'block';

            const masterBtn = document.getElementById('master-confirm-btn');
            if (nameVal && brandVal && condVal && descVal && hasImg && sessionTradeId) {
                if (!masterBtn.innerText.includes("SEAL COMMITTED")) {
                    masterBtn.disabled = false;
                }
            } else {
                masterBtn.disabled = true;
            }
        }

        function cascadeUIPanels() {
            setTimeout(() => {
                const el = document.getElementById('dispatch-panel');
                if(el) el.classList.add('revealed');
            }, 150);
            setTimeout(() => {
                const el = document.getElementById('local-panel');
                if(el) el.classList.add('revealed');
            }, 350);
            setTimeout(() => {
                const el = document.getElementById('remote-panel');
                if(el) el.classList.add('revealed');
            }, 550);
        }

        // --- Core 3D Chamber Environment Matrix ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.05);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4.5, 9.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // Heavy Stone Trading Table Asset Object
        const tableGeo = new THREE.BoxGeometry(7, 1.2, 4);
        resourcesToDispose.geometries.push(tableGeo);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x07070a, roughness: 0.5, metalness: 0.2 });
        resourcesToDispose.materials.push(tableMat);
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.set(0, 0.6, -1); 
        table.receiveShadow = true;
        scene.add(table);

        // Environment Props Construction
        const propsGroup = new THREE.Group();
        
        // Book Stack
        const bookGeo = new THREE.BoxGeometry(0.8, 0.12, 0.6);
        resourcesToDispose.geometries.push(bookGeo);
        const bookMat = new THREE.MeshStandardMaterial({ color: 0x2d1a13, roughness: 0.7 });
        resourcesToDispose.materials.push(bookMat);
        const book1 = new THREE.Mesh(bookGeo, bookMat);
        book1.position.set(-2.2, 1.26, -0.5);
        book1.rotation.y = 0.2;
        book1.castShadow = true;
        propsGroup.add(book1);

        const book2 = new THREE.Mesh(bookGeo, new THREE.MeshStandardMaterial({ color: 0x1c261e, roughness: 0.8 }));
        resourcesToDispose.materials.push(book2.material);
        book2.position.set(-2.22, 1.38, -0.52);
        book2.rotation.y = -0.1;
        book2.castShadow = true;
        propsGroup.add(book2);

        // Ink Bottle
        const bottleGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.25, 8);
        resourcesToDispose.geometries.push(bottleGeo);
        const bottleMat = new THREE.MeshStandardMaterial({ color: 0x051a24, transparent: true, opacity: 0.8, roughness: 0.1 });
        resourcesToDispose.materials.push(bottleMat);
        const inkBottle = new THREE.Mesh(bottleGeo, bottleMat);
        inkBottle.position.set(2.4, 1.32, -0.3);
        inkBottle.castShadow = true;
        propsGroup.add(inkBottle);

        // Parchment Sheets
        const paperGeo = new THREE.PlaneGeometry(0.7, 0.9);
        resourcesToDispose.geometries.push(paperGeo);
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xd2c4a7, roughness: 0.9, side: THREE.DoubleSide });
        resourcesToDispose.materials.push(paperMat);
        const paper = new THREE.Mesh(paperGeo, paperMat);
        paper.position.set(0.2, 1.205, -0.2);
        paper.rotation.set(Math.PI / 2, 0, 0.5);
        paper.receiveShadow = true;
        propsGroup.add(paper);

        scene.add(propsGroup);

        // Holographic Asset Frames Construction
        const holographicFramesGroup = new THREE.Group();
        const frameGeo = new THREE.BoxGeometry(1.6, 1.6, 0.05);
        resourcesToDispose.geometries.push(frameGeo);
        
        const leftFrameMat = new THREE.MeshStandardMaterial({ 
            color: 0x05050a, 
            emissive: 0xd4af37, 
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.85,
            roughness: 0.2
        });
        resourcesToDispose.materials.push(leftFrameMat);
        const leftFrame = new THREE.Mesh(frameGeo, leftFrameMat);
        leftFrame.position.set(-2.2, 2.3, -0.8);
        holographicFramesGroup.add(leftFrame);

        const rightFrameMat = new THREE.MeshStandardMaterial({ 
            color: 0x05050a, 
            emissive: 0xd4af37, 
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.85,
            roughness: 0.2
        });
        resourcesToDispose.materials.push(rightFrameMat);
        const rightFrame = new THREE.Mesh(frameGeo, rightFrameMat);
        rightFrame.position.set(2.2, 2.3, -0.8);
        holographicFramesGroup.add(rightFrame);

        scene.add(holographicFramesGroup);

        // Atmospheric Dust System
        const particleCount = 120;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 12;
            positions[i+1] = Math.random() * 6;
            positions[i+2] = (Math.random() - 0.5) * 8;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        resourcesToDispose.geometries.push(particleGeo);

        const particleTexture = new THREE.DataTexture(new Uint8Array([255,255,255,255]), 1, 1, THREE.RGBAFormat);
        particleTexture.needsUpdate = true;
        resourcesToDispose.textures.push(particleTexture);

        const particleMat = new THREE.PointsMaterial({
            color: 0xd4af37,
            size: 0.03,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
            map: particleTexture
        });
        resourcesToDispose.materials.push(particleMat);
        const dustParticles = new THREE.Points(particleGeo, particleMat);
        scene.add(dustParticles);

        // Add dust particles elements directly to cleanup logs
        resourcesToDispose.geometries.push(dustParticles.geometry);
        resourcesToDispose.materials.push(dustParticles.material);

        // Advanced Cinematic Lighting Architecture
        const focusPointLight = new THREE.PointLight(0xd4af37, 1.8, 15); 
        focusPointLight.position.set(0, 5, -0.5); 
        focusPointLight.castShadow = true;
        focusPointLight.shadow.mapSize.width = 1024;
        focusPointLight.shadow.mapSize.height = 1024;
        focusPointLight.shadow.bias = -0.002;
        scene.add(focusPointLight);

        const sideFillLight = new THREE.PointLight(0x1d2d44, 0.8, 12); 
        sideFillLight.position.set(-4, 3.5, -2); 
        scene.add(sideFillLight);

        const ambientLight = new THREE.AmbientLight(0x020205, 0.5);
        scene.add(ambientLight);

        let animationFrameId = null;
        function renderChamber() {
            animationFrameId = requestAnimationFrame(renderChamber);
            const time = performance.now() * 0.001;
            
            // Refined scan line and flicker animation simulator
            const flickerValue = 0.18 + Math.sin(time * 8) * 0.03 + (Math.random() * 0.02);
            if (!isCompleting) {
                leftFrame.rotation.y = time * 0.2;
                leftFrame.rotation.x = Math.sin(time * 0.4) * 0.05;
                
                rightFrame.rotation.y = -time * 0.2;
                rightFrame.rotation.x = Math.cos(time * 0.4) * 0.05;
                
                if (rightFrame.material.emissiveIntensity < 0.6) {
                    rightFrame.material.emissiveIntensity = flickerValue;
                }
            }
            
            // Atmospheric particle locomotion
            const positionsArr = dustParticles.geometry.attributes.position.array;
            for(let i = 1; i < positionsArr.length; i += 3) {
                positionsArr[i] += Math.sin(time + i) * 0.0015; 
                positionsArr[i-1] += Math.cos(time + i) * 0.001;
                if(positionsArr[i] > 6) positionsArr[i] = 0;
            }
            dustParticles.geometry.attributes.position.needsUpdate = true;
            
            // Smooth Cinematic Handheld and Camera Breathing Simulation
            camera.position.x = Math.sin(time * 0.3) * 0.12;
            camera.position.y = 4.5 + Math.cos(time * 0.4) * 0.06;
            camera.position.z = 9.5 + Math.sin(time * 0.2) * 0.08;
            camera.lookAt(0, 2.0, -0.8);
            
            renderer.render(scene, camera);
        }
        renderChamber();

        // Lifecycle optimization visibility engine handler
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                cancelAnimationFrame(animationFrameId);
            } else if (!isCompleting) {
                renderChamber();
            }
        });

        // --- Core Execution Logic Modules ---
        onAuthStateChanged(auth, (user) => {
            if(user) { 
                activeUser = user; 
                evalUrlParameters(); 
                cascadeUIPanels(); 
            } else { 
                safelyCleanUpAndRedirect("index.html");
            }
        });

        function evalUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const routeId = urlParams.get('id');
            if(routeId){
                sessionTradeId = routeId;
                const recNode = document.getElementById('target-recipient');
                const initBtn = document.getElementById('init-contract-btn');
                const dispPanel = document.getElementById('dispatch-panel');
                if(recNode) recNode.style.display = 'none';
                if(initBtn) initBtn.style.display = 'none';
                if(dispPanel) dispPanel.style.borderColor = 'transparent';
                
                if (!unsubs.length) {
                    mountSyncPipeline();
                }
            }
        }

        const initContractBtn = document.getElementById('init-contract-btn');
        if (initContractBtn) {
            initContractBtn.addEventListener('click', async () => {
                const targetInput = document.getElementById('target-recipient');
                if(!targetInput || !activeUser) return;
                const target = targetInput.value.trim();
                
                if(!target) {
                    showArchiveNotification("ERROR: TARGET SPECIMEN RECIPIENT FIELD IS BLANK.");
                    return;
                }
                if(target.toLowerCase() === activeUser.email.toLowerCase()) {
                    showArchiveNotification("ERROR: TRANSMISSION GRID CANNOT LOOP TO SELF.");
                    return;
                }

                const customId = `TRADE_${Date.now()}`; 
                sessionTradeId = customId;
                try {
                    await setDoc(doc(db, "trades", customId), {
                        id: customId, senderEmail: activeUser.email, receiverEmail: target, status: "pending", senderConfirm: false, receiverConfirm: false,
                        senderPenName: "", senderPenBrand: "", senderPenCond: "Mint (Collectible)", senderPenDesc: "", senderPenImg: "",
                        receiverPenName: "", receiverPenBrand: "", receiverPenCond: "Mint (Collectible)", receiverPenDesc: "", receiverPenImg: ""
                    });
                    currentRole = "sender"; 
                    targetInput.style.display = 'none';
                    initContractBtn.style.display = 'none';
                    document.getElementById('dispatch-panel').style.borderColor = 'transparent';
                    
                    if (!unsubs.length) {
                        mountSyncPipeline();
                    }
                    showArchiveNotification("MATRIX TRANSVERSE ESTABLISHED. INITIALIZING NETWORK STREAM.");
                } catch(e) { 
                    showArchiveNotification(`VAULT REJECTION: ${e.message}`); 
                }
            });
        }

        ['local-name', 'local-brand', 'local-cond', 'local-desc'].forEach(id => {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('input', () => {
                    validateLocalFields();
                    synchronizeLocalChangesToCloud();
                });
            }
        });

        async function compressAndProcessImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(img.src);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxCoord = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxCoord) { height *= maxCoord / width; width = maxCoord; }
                    } else {
                        if (height > maxCoord) { width *= maxCoord / height; height = maxCoord; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.75);
                };
            });
        }

        const localFileInput = document.getElementById('local-file');
        if (localFileInput) {
            localFileInput.addEventListener('change', async (e) => {
                if(!sessionTradeId || !currentRole) {
                    showArchiveNotification("ERROR: INITIALIZE THE TRANSACTION MATRIX BEFORE INJECTING FILE.");
                    return;
                }
                const file = e.target.files[0]; 
                if(!file) return;
                
                if(file.size > 10 * 1024 * 1024){
                    showArchiveNotification("IMAGE TOO LARGE");
                    return;
                }
                
                if(!file.type.startsWith('image/')) {
                    showArchiveNotification("REJECTION: LOGGED MATERIAL MUST BE AN IMAGING VARIANT.");
                    return;
                }

                showArchiveNotification("COMPRESSING SPECIMEN IMAGING STRUCTURE...");
                const compressedBlob = await compressAndProcessImage(file);
                
                const localPreview = document.getElementById('local-preview-img');
                if(localPreview) {
                    const previewURL = URL.createObjectURL(compressedBlob);
                    localPreview.onload = () => URL.revokeObjectURL(previewURL);
                    localPreview.src = previewURL;
                    localPreview.style.display = 'block';
                }

                showArchiveNotification("STREAMING MATERIAL BLOB TO VAULT CORES...");
                const imageRef = ref(storage, `trades/${sessionTradeId}/${currentRole}_specimen.jpg`);
                
                try {
                    await uploadBytes(imageRef, compressedBlob);
                    const downloadUrl = await getDownloadURL(imageRef);
                    
                    cachedLocalData.img = downloadUrl;
                    const payload = {}; 
                    payload[`${currentRole}PenImg`] = downloadUrl;
                    
                    await updateDoc(doc(db, "trades", sessionTradeId), payload);
                    validateLocalFields();
                    showArchiveNotification("IMAGING SIGNATURE LINKED TO MATRIX VAULT.");
                } catch(err) {
                    showArchiveNotification(`VAULT STORAGE FAILURE: ${err.message}`);
                }
            });
        }

        async function synchronizeLocalChangesToCloud() {
            if(!sessionTradeId || transmissionLock || isCompleting) return;
            
            const nameVal = document.getElementById('local-name').value;
            const brandVal = document.getElementById('local-brand').value;
            const condVal = document.getElementById('local-cond').value;
            const descVal = document.getElementById('local-desc').value;

            if (nameVal === cachedLocalData.name && 
                brandVal === cachedLocalData.brand && 
                condVal === cachedLocalData.cond && 
                descVal === cachedLocalData.desc) {
                return;
            }

            cachedLocalData.name = nameVal;
            cachedLocalData.brand = brandVal;
            cachedLocalData.cond = condVal;
            cachedLocalData.desc = descVal;

            const p = {};
            p[`${currentRole}PenName`] = nameVal;
            p[`${currentRole}PenBrand`] = brandVal;
            p[`${currentRole}PenCond`] = condVal;
            p[`${currentRole}PenDesc`] = descVal;
            
            try { 
                await updateDoc(doc(db, "trades", sessionTradeId), p); 
            } catch(e){
                console.error("Transmission backup anomaly detected:", e);
            }
        }

        function mountSyncPipeline() {
            if (!sessionTradeId) return;
            clearInterval(loadingInterval);

            const unsubscribe = onSnapshot(doc(db, "trades", sessionTradeId), async (snapshot) => {
                if(!snapshot.exists() || isCompleting) return;
                transmissionLock = true;
                const d = snapshot.data();

                currentRole = (activeUser.email === d.senderEmail) ? "sender" : "receiver";
                const peer = (currentRole === 'sender') ? 'receiver' : 'sender';

                const pName = d[`${peer}PenName`] ?? "";
                const pBrand = d[`${peer}PenBrand`] ?? "";
                const pCond = d[`${peer}PenCond`] ?? "";
                const pDesc = d[`${peer}PenDesc`] ?? "";

                const activeDataString = `${pName}-${pBrand}-${pCond}-${pDesc}`;
                if (activeDataString !== cachedPeerDataString) {
                    cachedPeerDataString = activeDataString;
                    
                    const remotePanel = document.getElementById('remote-panel');
                    if (remotePanel) {
                        remotePanel.classList.add('holo-pulse');
                        setTimeout(() => remotePanel.classList.remove('holo-pulse'), 1200);
                    }

                    rightFrame.material.emissiveIntensity = 0.95;
                    setTimeout(() => { if(!isCompleting) rightFrame.material.emissiveIntensity = 0.2; }, 600);
                }

                const rEmail = peer === "sender"
                    ? (d.senderEmail || "UNKNOWN CORE")
                    : (d.receiverEmail || "UNKNOWN CORE");

                const remoteContent = document.getElementById('remote-data-content');
                if (remoteContent) {
                    remoteContent.innerHTML = `
                        <p style="color:#d4af37; font-size:0.75rem; margin-bottom:6px;">VAULT SOURCE: ${rEmail.toUpperCase()}</p>
                        <h3 style="font-weight:300; margin-bottom:8px; color:#fff;">${pName || 'Awaiting Node Sync...'}</h3>
                        <p><b>BRAND:</b> ${pBrand || 'N/A'}</p>
                        <p><b>COND:</b> ${pCond || 'N/A'}</p>
                        <p style="margin-top:8px; font-size:0.8rem; color:#8a8a93; font-style:italic;">"${pDesc || ''}"</p>
                    `;
                }
                
                const rImg = document.getElementById('remote-preview-img');
                if (rImg) {
                    if (d[`${peer}PenImg`]) { 
                        rImg.src = d[`${peer}PenImg`]; 
                        rImg.style.display = "block"; 
                    } else { 
                        rImg.style.display = "none"; 
                    }
                }

                if(document.activeElement?.id ? !document.activeElement.id.startsWith('local') : true) {
                    const lName = document.getElementById('local-name');
                    const lBrand = document.getElementById('local-brand');
                    const lCond = document.getElementById('local-cond');
                    const lDesc = document.getElementById('local-desc');
                    
                    if(lName) lName.value = d[`${currentRole}PenName`] || "";
                    if(lBrand) lBrand.value = d[`${currentRole}PenBrand`] || "";
                    if(lCond) lCond.value = d[`${currentRole}PenCond`] || "Mint (Collectible)";
                    if(lDesc) lDesc.value = d[`${currentRole}PenDesc`] || "";
                    
                    cachedLocalData.name = lName ? lName.value : "";
                    cachedLocalData.brand = lBrand ? lBrand.value : "";
                    cachedLocalData.cond = lCond ? lCond.value : "Mint (Collectible)";
                    cachedLocalData.desc = lDesc ? lDesc.value : "";

                    const myImg = document.getElementById("local-preview-img");
                    if(myImg) {
                        if(d[`${currentRole}PenImg`]){ 
                            myImg.src = d[`${currentRole}PenImg`]; 
                            myImg.style.display = "block"; 
                            leftFrame.material.emissiveIntensity = 0.55; 
                            cachedLocalData.img = d[`${currentRole}PenImg`];
                        } else {
                            myImg.style.display = "none";
                            myImg.src = "";
                            cachedLocalData.img = "";
                        }
                    }
                }

                const masterConfirmBtn = document.getElementById('master-confirm-btn');
                if(d[`${currentRole}Confirm`] && masterConfirmBtn) {
                    masterConfirmBtn.innerText = "SEAL COMMITTED // AWAITING MATRIX SYNC...";
                    masterConfirmBtn.style.background = '#0a0a0f';
                    masterConfirmBtn.disabled = true;
                    
                    ['local-name', 'local-brand', 'local-cond', 'local-desc', 'inject-sig-btn'].forEach(id => {
                        const el = document.getElementById(id);
                        if(el) el.disabled = true;
                    });
                }

                validateLocalFields();

                if(d.senderConfirm && d.receiverConfirm){
                    isCompleting = true;
                    if(d.status !== "completed"){ 
                        try{ 
                            await updateDoc(doc(db,"trades",sessionTradeId),{ status:"completed" }); 
                        } catch(e){} 
                    }
                    executeCinematicCommitSequence();
                }
                transmissionLock = false;
            }, (error) => {
                showArchiveNotification(`STREAM SYNC LOSS: ${error.message}`);
            });

            unsubs.push(unsubscribe);
        }

        const masterConfirmBtn = document.getElementById('master-confirm-btn');
        if (masterConfirmBtn) {
            masterConfirmBtn.addEventListener('click', async () => {
                if(!sessionTradeId || isCompleting) return;
                
                masterConfirmBtn.disabled = true;
                
                try {
                    const snap = await getDoc(doc(db, "trades", sessionTradeId));
                    if(snap.data()?.[`${currentRole}Confirm`]) return;

                    const p = {}; 
                    p[`${currentRole}Confirm`] = true;
                    
                    await synchronizeLocalChangesToCloud();
                    await updateDoc(doc(db, "trades", sessionTradeId), p); 
                } catch(e){
                    masterConfirmBtn.disabled = false;
                    showArchiveNotification(`TRANSACTION REJECTION: ${e.message}`);
                }
            });
        }

        function executeCinematicCommitSequence() {
            const interactiveElements = document.querySelectorAll('.interactive');
            interactiveElements.forEach(el => el.style.pointerEvents = 'none');
            
            let dimInterval = setInterval(() => {
                if(focusPointLight.intensity > 0.05) {
                    focusPointLight.intensity -= 0.08;
                    sideFillLight.intensity -= 0.04;
                    ambientLight.intensity -= 0.02;
                    leftFrame.material.emissiveIntensity -= 0.03;
                    rightFrame.material.emissiveIntensity -= 0.03;
                } else {
                    focusPointLight.intensity = 0;
                    sideFillLight.intensity = 0;
                    ambientLight.intensity = 0.02;
                    leftFrame.material.emissiveIntensity = 0;
                    rightFrame.material.emissiveIntensity = 0;
                    clearInterval(dimInterval);
                }
            }, 50);

            setTimeout(() => {
                const seal = document.getElementById('wax-seal-overlay');
                if(seal) seal.classList.add('stamped');
                
                setTimeout(() => {
                    const blockout = document.getElementById("completion-blockout");
                    if(blockout) blockout.classList.add("triggered");
                    
                    setTimeout(() => {
                        safelyCleanUpAndRedirect("index.html");
                    }, 3500);
                }, 1200);
            }, 1000);
        }

        function safelyCleanUpAndRedirect(destination) {
            while(unsubs.length > 0) {
                const unsub = unsubs.pop();
                if(typeof unsub === 'function') unsub();
            }
            clearInterval(loadingInterval);

            if(animationFrameId) cancelAnimationFrame(animationFrameId);

            try {
                resourcesToDispose.geometries.forEach(g => g.dispose());
                resourcesToDispose.materials.forEach(m => m.dispose());
                resourcesToDispose.textures.forEach(t => t.dispose());
                
                renderer.dispose();
            } catch(e) {
                console.error("Garbage collection safety bypass failure:", e);
            }

            window.location.href = destination;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('unload', () => {
            while(unsubs.length > 0) {
                const unsub = unsubs.pop();
                if(typeof unsub === 'function') unsub();
            }
        });
    </script>
</body>
</html>
