<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chamber - Transaction Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #010103; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
        
        #chamber-hud {
            position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 35px; pointer-events: none;
        }
        .interactive { pointer-events: auto; }
        
        .glass-panel {
            background: rgba(3, 3, 5, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(214, 175, 55, 0.2); border-radius: 2px; padding: 30px; color: #fff;
            width: 430px; box-shadow: 0 35px 70px rgba(0,0,0,0.95);
            opacity: 0; transform: translateY(15px); transition: all 1s ease;
        }
        .glass-panel.revealed { opacity: 1; transform: translateY(0); }
        
        .workspace-row { display: flex; justify-content: space-between; width: 100%; margin-top: auto; margin-bottom: auto; }
        
        input, textarea, select {
            width: 100%; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(214,175,55,0.15);
            padding: 12px; margin: 10px 0; color: #fff; border-radius: 2px; font-family: inherit; outline: none; font-size: 0.8rem;
        }
        input:focus, textarea:focus, select:focus { border-color: #d4af37; }
        
        .gold-btn {
            background: linear-gradient(135deg, #201b14 0%, #0a0806 100%); color: #d4af37;
            border: 1px solid rgba(214,175,55,0.35); padding: 18px; width: 100%; cursor: pointer;
            font-family: inherit; letter-spacing: 4px; font-weight: bold; border-radius: 2px; transition: all 0.4s ease;
        }
        .gold-btn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 30px rgba(214,175,55,0.35); }
        
        #master-confirm-btn {
            background: linear-gradient(135deg, #4d1212 0%, #1a0404 100%);
            border-color: rgba(214,175,55,0.4); color: #edc46f; font-size: 1.05rem; letter-spacing: 5px;
        }
        #master-confirm-btn:hover { background: linear-gradient(135deg, #601717 0%, #240606 100%); border-color: #fff; }
        
        .display-box { 
            width: 100%; min-height: 140px; background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(214,175,55,0.15); margin-top: 15px; padding: 20px; border-radius: 2px; line-height: 1.6;
        }
        .preview-frame { 
            width: 100%; height: 130px; object-fit: contain; background: rgba(0,0,0,0.5); 
            border-radius: 2px; border: 1px dashed rgba(214,175,55,0.2); margin-bottom: 5px;
        }
        
        #footer-control { width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        #completion-blockout {
            position: absolute; top:0; left:0; width:100%; height:100%; background: #010103; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 2s ease;
        }
        #completion-blockout.triggered { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="completion-blockout">
        <h1 style="color:#d4af37; letter-spacing: 15px; font-weight: 300; font-size: 2rem; margin-bottom:15px;">THE SWAP COMMITTED</h1>
        <p style="color:#555; letter-spacing: 4px; font-size:0.8rem;">THE ARCHIVE GROWS SILENT.</p>
    </div>

    <div id="chamber-hud">
        <div style="display:flex; justify-content:space-between; width:100%;">
            <div class="glass-panel interactive" id="dispatch-panel" style="width:360px; padding:20px;">
                <input type="email" id="target-recipient" placeholder="COUNTERPARTY DESTINATION EMAIL">
                <button class="gold-btn" id="init-contract-btn" style="padding:12px; font-size:0.75rem;">DISPATCH TRANSACTION GRID</button>
            </div>
            <div style="color:#d4af37; letter-spacing:4px; font-size:0.8rem; padding:15px;">
                SECURE CHAMBER NODE
            </div>
        </div>

        <div class="workspace-row">
            <div class="glass-panel interactive" id="local-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">LOCAL SPECIMEN LOG</h4>
                <input type="file" id="local-file" accept="image/*" style="display:none;">
                <button class="gold-btn" onclick="document.getElementById('local-file').click()" style="padding:12px; font-size:0.7rem; margin-bottom:10px;">INJECT IMAGING SIGNATURE</button>
                <img class="preview-frame" id="local-preview-img" src="" style="display:none;">
                
                <input type="text" id="local-name" placeholder="PEN VARIANT NAME">
                <input type="text" id="local-brand" placeholder="MANUFACTURER BRAND">
                <select id="local-cond">
                    <option value="Mint (Collectible)">MINT CONDITION</option>
                    <option value="Fine (Light Wear)">FINE CONDITION</option>
                    <option value="Vintage Restored">VINTAGE RESTORED</option>
                </select>
                <textarea id="local-desc" rows="2" placeholder="STRUCTURAL SYSTEM RUNTIME NOTES..."></textarea>
            </div>

            <div class="glass-panel" id="remote-panel">
                <h4 style="color:#d4af37; letter-spacing:3px; margin-bottom:15px; font-weight:300;">COUNTERPARTY MANIFEST</h4>
                <img class="preview-frame" id="remote-preview-img" src="" style="display:none;">
                <div class="display-box" id="remote-data-content">AWAITING CORRESPONDING NETWORK NODE STREAM LINK...</div>
            </div>
        </div>

        <div id="footer-control" class="interactive">
            <button class="gold-btn" id="master-confirm-btn">PRESS WAX SEAL RECOGNITION</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBW2cqHZSZ7pe8BhwW82p8H3uVlhndsZY",
            authDomain: "pentrade.firebaseapp.com",
            projectId: "pentrade",
            storageBucket: "pentrade.firebasestorage.app",
            messagingSenderId: "912322438619",
            appId: "1:912322438619:web:0c68111d715cfdb5b7b3fe",
            measurementId: "G-LHV26VY0WR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;
        let sessionTradeId = null;
        let currentRole = null;
        let transmissionLock = false;
        let cachedPeerDataString = "";

        function cascadeUIPanels() {
            setTimeout(() => document.getElementById('dispatch-panel').classList.add('revealed'), 150);
            setTimeout(() => document.getElementById('local-panel').classList.add('revealed'), 350);
            setTimeout(() => document.getElementById('remote-panel').classList.add('revealed'), 550);
        }

        // --- Core 3D Chamber Environment Matrix ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.06);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Heavy Stone Trading Table Asset Object
        const table = new THREE.Mesh(new THREE.BoxGeometry(7, 1.2, 4), new THREE.MeshStandardMaterial({ color: 0x09090c, roughness: 0.4 }));
        table.position.set(0, 0.6, -1); scene.add(table);

        // Twin Holographic Asset Frames 
        const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 0.1), new THREE.MeshStandardMaterial({ color: 0x0a0a0f, emissive: 0xd4af37, emissiveIntensity: 0.15 }));
        leftFrame.position.set(-2, 2, -0.8); scene.add(leftFrame);

        const rightFrame = leftFrame.clone(); rightFrame.position.x = 2; scene.add(rightFrame);

        const focusPointLight = new THREE.PointLight(0xd4af37, 1.5, 15); focusPointLight.position.set(0, 4.5, -0.5); scene.add(focusPointLight);
        const sideFillLight = new THREE.PointLight(0x1d2d44, 0.6, 12); sideFillLight.position.set(-3, 3, -2); scene.add(sideFillLight);

        function renderChamber() {
            requestAnimationFrame(renderChamber);
            const time = performance.now() * 0.001;
            
            leftFrame.rotation.y = time * 0.3;
            rightFrame.rotation.y = -time * 0.3;
            
            camera.position.x = Math.sin(time * 0.2) * 0.1;
            camera.position.y = 4 + Math.cos(time * 0.25) * 0.03;
            
            renderer.render(scene, camera);
        }
        renderChamber();

        // --- Core Execution Logic Modules ---
        onAuthStateChanged(auth, (user) => {
            if(user) { activeUser = user; evalUrlParameters(); cascadeUIPanels(); }
            else { window.location.href = "index.html"; }
        });

        function evalUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const routeId = urlParams.get('id');
            if(routeId){
                sessionTradeId = routeId;
                document.getElementById('target-recipient').style.display = 'none';
                document.getElementById('init-contract-btn').style.display = 'none';
                document.getElementById('dispatch-panel').style.borderColor = 'transparent';
                mountSyncPipeline();
            }
        }

        document.getElementById('init-contract-btn').addEventListener('click', async () => {
            const target = document.getElementById('target-recipient').value.trim();
            if(!target || target === activeUser.email) return;
            const customId = `TRADE_${Date.now()}`; sessionTradeId = customId;
            try {
                await setDoc(doc(db, "trades", customId), {
                    id: customId, senderEmail: activeUser.email, receiverEmail: target, status: "pending", senderConfirm: false, receiverConfirm: false,
                    senderPenName: "", senderPenBrand: "", senderPenCond: "", senderPenDesc: "", senderPenImg: "",
                    receiverPenName: "", receiverPenBrand: "", receiverPenCond: "", receiverPenDesc: "", receiverPenImg: ""
                });
                currentRole = "sender"; mountSyncPipeline();
            } catch(e) { alert(e.message); }
        });

        ['local-name', 'local-brand', 'local-cond', 'local-desc'].forEach(id => {
            document.getElementById(id).addEventListener('input', synchronizeLocalChangesToCloud);
        });

        document.getElementById('local-file').addEventListener('change', (e) => {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = async (event) => {
                const b64 = event.target.result;
                document.getElementById('local-preview-img').src = b64;
                document.getElementById('local-preview-img').style.display = 'block';
                if(sessionTradeId) {
                    const payload = {}; payload[`${currentRole}PenImg`] = b64;
                    try { 
                        await updateDoc(doc(db, "trades", sessionTradeId), payload); 
                        await synchronizeLocalChangesToCloud();
                    } catch(err){}
                }
            };
            r.readAsDataURL(file);
        });

        async function synchronizeLocalChangesToCloud() {
            if(!sessionTradeId || transmissionLock) return;
            const p = {};
            p[`${currentRole}PenName`] = document.getElementById('local-name').value;
            p[`${currentRole}PenBrand`] = document.getElementById('local-brand').value;
            p[`${currentRole}PenCond`] = document.getElementById('local-cond').value;
            p[`${currentRole}PenDesc`] = document.getElementById('local-desc').value;
            try { await updateDoc(doc(db, "trades", sessionTradeId), p); } catch(e){}
        }

        function mountSyncPipeline() {
            onSnapshot(doc(db, "trades", sessionTradeId), async (snapshot) => {
                if(!snapshot.exists()) return;
                transmissionLock = true;
                const d = snapshot.data();

                currentRole = (activeUser.email === d.senderEmail) ? "sender" : "receiver";
                const peer = (currentRole === 'sender') ? 'receiver' : 'sender';

                const activeDataString = `${d[peer+'PenName']}-${d[peer+'PenBrand']}-${d[peer+'PenCond']}-${d[peer+'PenDesc']}`;
                if (activeDataString !== cachedPeerDataString) {
                    cachedPeerDataString = activeDataString;
                    rightFrame.material.emissiveIntensity = 0.7;
                    setTimeout(() => rightFrame.material.emissiveIntensity = 0.15, 500);
                }

                document.getElementById('remote-data-content').innerHTML = `
                    <p style="color:#d4af37; font-size:0.75rem; margin-bottom:6px;">VAULT SOURCE: ${d[peer+'Email'].toUpperCase()}</p>
                    <h3 style="font-weight:300; margin-bottom:8px; color:#fff;">${d[peer+'PenName'] || 'Awaiting Node Sync...'}</h3>
                    <p><b>BRAND:</b> ${d[peer+'PenBrand'] || 'N/A'}</p>
                    <p><b>COND:</b> ${d[peer+'PenCond'] || 'N/A'}</p>
                    <p style="margin-top:8px; font-size:0.8rem; color:#8a8a93; font-style:italic;">"${d[peer+'PenDesc'] || ''}"</p>
                `;
                
                const rImg = document.getElementById('remote-preview-img');
                if(dPeerImg => d[`${peer}PenImg`]){ rImg.src = d[`${peer}PenImg`]; rImg.style.display = "block"; }
                else { rImg.style.display = "none"; }

                if(document.activeElement?.id ? !document.activeElement.id.startsWith('local') : true) {
                    document.getElementById('local-name').value = d[`${currentRole}PenName`] || "";
                    document.getElementById('local-brand').value = d[`${currentRole}PenBrand`] || "";
                    document.getElementById('local-cond').value = d[`${currentRole}PenCond`] || "Mint (Collectible)";
                    document.getElementById('local-desc').value = d[`${currentRole}PenDesc`] || "";
                    const myImg = document.getElementById("local-preview-img");
                    if(d[`${currentRole}PenImg`]){ myImg.src = d[`${currentRole}PenImg`]; myImg.style.display = "block"; leftFrame.material.emissiveIntensity = 0.45; }
                }

                if(d[`${currentRole}Confirm`]) {
                    document.getElementById('master-confirm-btn').innerText = "SEAL COMMITTED // AWAITING MATRIX SYNC...";
                    document.getElementById('master-confirm-btn').style.background = '#0a0a0f';
                }

                if(d.senderConfirm && d.receiverConfirm){
                    if(d.status !== "completed"){ try{ await updateDoc(doc(db,"trades",sessionTradeId),{ status:"completed" }); }catch(e){} }
                    focusPointLight.intensity = 0; sideFillLight.intensity = 0;
                    document.getElementById("completion-blockout").classList.add("triggered");
                    setTimeout(()=>{ window.location.href="index.html"; }, 4000);
                }
                transmissionLock = false;
            });
        }

        document.getElementById('master-confirm-btn').addEventListener('click', async () => {
            if(!sessionTradeId) return;
            const p = {}; p[`${currentRole}Confirm`] = true;
            try { 
                await synchronizeLocalChangesToCloud();
                await updateDoc(doc(db, "trades", sessionTradeId), p); 
            } catch(e){}
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
